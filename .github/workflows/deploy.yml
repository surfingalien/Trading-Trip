name: FinSight CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Backend: lint + test ─────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies (lite subset for CI)
        run: |
          pip install fastapi pydantic pydantic-settings numpy pandas \
                      pytest pytest-asyncio httpx yfinance asyncpg

      - name: Run unit tests
        run: |
          pytest backend/tests/test_search.py backend/tests/test_trading_tips.py \
            -v --tb=short -x
        env:
          DATABASE_URL: "postgresql+asyncpg://ci:ci@localhost/ci"
          REDIS_URL: "redis://localhost:6379/0"

  # ── Frontend: build + deploy ──────────────────────────────────────
  build-and-deploy:
    name: Build & Deploy Frontend → GitHub Pages
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /Trading-Trip
          NEXT_PUBLIC_API_URL: https://trading-trip-api.onrender.com
          NEXT_PUBLIC_WS_URL: wss://trading-trip-ws.onrender.com

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/out
          publish_branch: gh-pages

  # ── Backend: deploy to Render ─────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: [backend-test]
    if: github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Trigger Render deploy
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -s "$RENDER_DEPLOY_HOOK"
            echo "Render deploy triggered."
          else
            echo "RENDER_DEPLOY_HOOK not set — skipping backend deploy."
          fi
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}

  # ── Weekly ML retraining ──────────────────────────────────────────
  ml-retrain:
    name: Weekly ML Model Retraining
    runs-on: ubuntu-latest
    # Only on manual trigger or weekly cron (add cron in separate workflow for weekly)
    if: github.event_name == 'workflow_dispatch'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install ML dependencies
        run: |
          pip install yfinance numpy pandas scikit-learn xgboost

      - name: Retrain models
        run: |
          mkdir -p backend/ml/models
          python -m backend.ml.pipeline --symbol AAPL  --horizon 7
          python -m backend.ml.pipeline --symbol NVDA  --horizon 7
          python -m backend.ml.pipeline --symbol MSFT  --horizon 7
          python -m backend.ml.pipeline --symbol AAPL  --horizon 30
          python -m backend.ml.pipeline --symbol NVDA  --horizon 30
        env:
          MODEL_DIR: backend/ml/models

      - name: Upload models as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ml-models
          path: backend/ml/models/
          retention-days: 30
