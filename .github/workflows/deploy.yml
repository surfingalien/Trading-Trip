name: Deploy FinSight → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build & Deploy FinSight
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: finsight-app/package-lock.json

      - name: Install dependencies
        working-directory: finsight-app
        run: npm ci

      - name: Build
        working-directory: finsight-app
        run: npm run build
        env:
          VITE_BASE: /Trading-Trip/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: finsight-app/dist
          publish_branch: gh-pages

  redeploy-render:
    name: Redeploy → Render
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Trigger Render deploy
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -s "$RENDER_DEPLOY_HOOK"
          fi
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
