name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Build & Deploy Frontend → GitHub Pages ────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://trading-trip-api.onrender.com
          NEXT_PUBLIC_WS_URL: wss://trading-trip-ws.onrender.com
          NEXT_PUBLIC_BASE_PATH: /Trading-Trip

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/out
          force_orphan: true

  # ── Trigger Render redeployment ───────────────────────────────────────────
  redeploy-render:
    name: Redeploy → Render
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_DEPLOY_HOOK != '' }}
    steps:
      - name: Trigger Render deploy
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}"
