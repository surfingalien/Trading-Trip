services:
  # ── Python REST API ────────────────────────────────────────────────────────
  - type: web
    name: trading-trip-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
    healthCheckPath: /health

  # ── WebSocket Price Broadcast ──────────────────────────────────────────────
  - type: web
    name: trading-trip-ws
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.ws_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
