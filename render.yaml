services:
  # ── Next.js Frontend ───────────────────────────────────────────────────────
  - type: web
    name: trading-trip-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.0.0"
      - key: TRADING_API_URL
        fromService:
          name: trading-trip-api
          type: web
          property: host
      - key: NEXT_PUBLIC_WS_URL
        fromService:
          name: trading-trip-ws
          type: web
          property: host

  # ── Python REST API ────────────────────────────────────────────────────────
  - type: web
    name: trading-trip-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: uvicorn api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
    healthCheckPath: /health

  # ── WebSocket Price Broadcast ──────────────────────────────────────────────
  - type: web
    name: trading-trip-ws
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: uvicorn api.ws_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
